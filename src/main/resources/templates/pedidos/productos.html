<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos del Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; }
        h2, h5 { font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: -1px; }
        .section-card { background: #fff; border: 2px solid #111; border-radius: 16px; }
        .btn-dark { background: #111; border-color: #111; }
        .producto-row { border-bottom: 1px solid #eee; padding: 10px 0; }
        .producto-row:last-child { border-bottom: none; }
        .precio-badge { background: #e8f5e9; color: #2e7d32; font-weight: 600; padding: 2px 10px; border-radius: 99px; font-size: .8rem; }
        .assigned-badge { background: #fff3e0; color: #e65100; font-size: .75rem; padding: 2px 8px; border-radius: 99px; }
        .top-bar { border-bottom: 2px solid #111; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="mb-4 pb-3 top-bar">
            <a href="/pedidos" class="text-decoration-none text-muted small">← Volver a pedidos</a>
            <h2 class="mt-1 mb-0">Pedido #<span th:text="${pedido.id}"></span></h2>
            <p class="text-muted mb-0">
                Cliente: <strong th:text="${pedido.cliente}"></strong> &nbsp;·&nbsp;
                Fecha: <span th:text="${pedido.fecha}"></span>
            </p>
        </div>

        <div class="row g-4">

            <!-- Productos ya asignados -->
            <div class="col-md-6">
                <div class="section-card p-4">
                    <h5 class="mb-3">✅ En este pedido
                        <span class="ms-2" style="font-size:.8rem;font-weight:400;color:#888;"
                              th:text="'(' + ${#sets.size(pedido.productos)} + ' producto/s)'"></span>
                    </h5>

                    <div th:if="${#sets.isEmpty(pedido.productos)}" class="text-muted small">
                        Aún no hay productos asignados.
                    </div>

                    <div th:each="p : ${pedido.productos}" class="producto-row d-flex justify-content-between align-items-center">
                        <div>
                            <span class="fw-500" th:text="${p.nombre}"></span>
                            <span class="precio-badge ms-2" th:text="'€' + ${p.precio}"></span>
                        </div>
                        <!-- Desasignar: POST para evitar CSRF con GET -->
                        <form th:action="@{/pedidos/{pid}/desasignar/{rid}(pid=${pedido.id},rid=${p.id})}" method="post">
                            <button class="btn btn-outline-danger btn-sm" onclick="return confirm('¿Quitar del pedido?')">Quitar</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Productos disponibles para añadir -->
            <div class="col-md-6">
                <div class="section-card p-4">
                    <h5 class="mb-3">📦 Catálogo completo</h5>

                    <div th:if="${#lists.isEmpty(todosProductos)}" class="text-muted small">
                        No hay productos en el catálogo.
                        <a href="/productos/nuevo">Crear uno →</a>
                    </div>

                    <div th:each="p : ${todosProductos}" class="producto-row d-flex justify-content-between align-items-center">
                        <div>
                            <span class="fw-500" th:text="${p.nombre}"></span>
                            <span class="precio-badge ms-2" th:text="'€' + ${p.precio}"></span>
                            <!-- Indicar si ya está asignado -->
                            <span th:if="${pedido.productos.contains(p)}" class="assigned-badge ms-1">ya añadido</span>
                        </div>
                        <form th:unless="${pedido.productos.contains(p)}"
                              th:action="@{/pedidos/{pid}/asignar/{rid}(pid=${pedido.id},rid=${p.id})}" method="post">
                            <button class="btn btn-dark btn-sm">+ Añadir</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
