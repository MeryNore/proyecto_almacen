<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tienda — Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: center; }
        h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 3.5rem; letter-spacing: -2px; }
        .card-nav { border: 2px solid #111; border-radius: 16px; transition: transform .2s, background .2s; cursor: pointer; background: #fff; }
        .card-nav:hover { transform: translateY(-4px); background: #111; color: #fff !important; }
        .card-nav:hover .text-muted { color: #aaa !important; }
        .badge-pill { background: #111; color: #fff; font-family: 'Syne', sans-serif; font-size: .75rem; padding: 4px 12px; border-radius: 99px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="mb-5">
            <span class="badge-pill mb-3 d-inline-block">Spring Boot + JPA</span>
            <h1 class="mb-2">Gestión<br>de Tienda</h1>
            <p class="text-muted fs-5">CRUD completo con relación N:M entre Pedidos y Productos</p>
        </div>
        <div class="row g-4">
            <div class="col-md-5">
                <a href="/productos" class="text-decoration-none text-dark">
                    <div class="card-nav p-4">
                        <div class="fs-1 mb-2">📦</div>
                        <h4 class="fw-bold mb-1">Productos</h4>
                        <p class="text-muted mb-0">Crear, editar y eliminar productos del catálogo</p>
                    </div>
                </a>
            </div>
            <div class="col-md-5">
                <a href="/pedidos" class="text-decoration-none text-dark">
                    <div class="card-nav p-4">
                        <div class="fs-1 mb-2">🛒</div>
                        <h4 class="fw-bold mb-1">Pedidos</h4>
                        <p class="text-muted mb-0">Gestionar pedidos y asignarles productos</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
