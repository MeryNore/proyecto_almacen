<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; }
        h2 { font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: -1px; }
        .table thead th { background: #111; color: #fff; font-family: 'Syne', sans-serif; font-size: .85rem; letter-spacing: .05em; }
        .table tbody tr:hover { background: #fffbe6; }
        .btn-dark { background: #111; border-color: #111; }
        .precio-badge { background: #e8f5e9; color: #2e7d32; font-weight: 600; padding: 3px 10px; border-radius: 99px; font-size: .85rem; }
        .top-bar { border-bottom: 2px solid #111; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 top-bar">
            <div>
                <a href="/" class="text-decoration-none text-muted small">← Inicio</a>
                <h2 class="mb-0 mt-1">📦 Productos</h2>
            </div>
            <a href="/productos/nuevo" class="btn btn-dark px-4">+ Nuevo producto</a>
        </div>

        <div th:if="${#lists.isEmpty(productos)}" class="text-center py-5 text-muted">
            <p class="fs-5">No hay productos aún. ¡Crea el primero!</p>
        </div>

        <table th:unless="${#lists.isEmpty(productos)}" class="table table-bordered bg-white shadow-sm rounded">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>En pedidos</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${productos}">
                    <td class="text-muted small" th:text="${p.id}"></td>
                    <td class="fw-500" th:text="${p.nombre}"></td>
                    <td><span class="precio-badge" th:text="'€' + ${p.precio}"></span></td>
                    <td class="text-muted small" th:text="${#sets.size(p.pedidos)} + ' pedido(s)'"></td>
                    <td>
                        <a th:href="@{/productos/editar/{id}(id=${p.id})}" class="btn btn-outline-dark btn-sm me-1">Editar</a>
                        <a th:href="@{/productos/eliminar/{id}(id=${p.id})}"
                           class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('¿Eliminar producto?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
